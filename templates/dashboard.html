{% extends "base.html" %}

{% block head %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}

{% block content %}
<div class="content-header">
    <h1>Memory Usage Dashboard</h1>
</div>

<div class="controls-card">
    <div class="controls-row">
        <button id="startBtn" class="btn btn-primary">Start Measurement</button>
        <button id="stopBtn" class="btn btn-danger" disabled>Stop Measurement</button>
    </div>

    <div class="vitals-row">
        <div class="vitals-container" id="vitalsContainer">
            <div class="vitals-base" id="vitalsSummary">
                <span id="vitalsLabel">Local</span>
                <span class="vitals-indicator" id="vitalsIndicator"></span>
            </div>
            
            <div class="vitals-expanded-content" id="vitalsExpandedContent">
                <span class="vitals-divider">|</span>
                <span id="vitalDetailsText">Loading...</span>
                <span class="vitals-divider">|</span>
                <button class="vitals-refresh-btn" id="vitalsRefreshBtn" title="Force Refresh">🔄</button>
                <span class="vitals-timer" id="vitalsTimerText"></span>
            </div>
        </div>
    </div>

    <div id="status" class="status-indicator">Status: Idle</div>
</div>

<div class="chart-container card">
    <canvas id="memoryChart"></canvas>
</div>

<div class="results-table-container card">
    <h2>Recent Results</h2>
    <div class="table-responsive">
        <table id="resultsTable">
            <thead>
                <tr>
                    <th style="width: 60px;">ID</th>
                    <th style="width: 100px;">Group</th>
                    <th style="width: 130px;">Build Time (s)</th>
                    <th style="width: 130px;">Avg Memory (MB)</th>
                    <th>Build Flags</th>
                    <th>Runtime Flags</th>
                    <th style="width: 180px;">Timestamp</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>
{% endblock %}
